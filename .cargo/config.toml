[build]
# Use fewer codegen-units in dev to reduce intermediate artifacts on disk
# (override the 256 in Cargo.toml which generates massive target dirs)
# Uncomment below if disk usage is a concern during local development:
# codegen-units = 16

[profile.dev]
# Split debuginfo reduces target/ size significantly on macOS
split-debuginfo = "unpacked"

[net]
git-fetch-with-cli = true

# ---------------------------------------------------------------------------
# Platform-specific linker overrides (opt-in)
# ---------------------------------------------------------------------------
# Uncomment to use mold on Linux for ~2-5x faster linking.
# Install: apt install mold (Debian/Ubuntu) or pacman -S mold (Arch)
#
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]
#
# [target.aarch64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

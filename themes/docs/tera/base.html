<!DOCTYPE html>
<html lang="{{ site.language | default(value='en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ page.title | default(value="") }}{% endblock %} — {{ site.title | default(value="Docs") }}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <link rel="stylesheet" href="/css/docs.css">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <a href="#content" class="sr-only">Skip to content</a>
  <div class="layout">
    <aside class="sidebar" role="navigation" aria-label="Documentation">
      <div class="sidebar-header">
        <a href="/">{{ site.name | default(value="Docs") }}</a>
      </div>
      {% block sidebar %}
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
        </ul>
      </nav>
      {% endblock %}
    </aside>
    <main id="content" role="main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>

# SPDX-License-Identifier: Apache-2.0 OR MIT

name: Accessibility

on:
  push:
    branches: [main, feat/**]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: a11y-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  axe:
    name: WCAG 2.1 AA
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
          show-progress: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: quick-linux
          save-if: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install pa11y
        run: npm install -g pa11y

      - name: Build SSG
        run: cargo build --locked

      - name: Generate example site
        run: |
          ./target/debug/ssg \
            -c examples/content/en \
            -o /tmp/a11y-site \
            -t examples/templates \
            -q

      - name: Serve site and run pa11y
        run: |
          set -euo pipefail

          # Start a local HTTP server so pa11y can load inline CSS
          python3 -m http.server 8787 --directory /tmp/a11y-site &
          SERVER_PID=$!
          sleep 1

          # Collect page URLs from generated HTML files
          urls=""
          for html in /tmp/a11y-site/*/index.html /tmp/a11y-site/index.html; do
            [ -f "$html" ] || continue
            rel="${html#/tmp/a11y-site/}"
            urls="$urls http://localhost:8787/$rel"
          done

          # Write pa11y config with Chrome sandbox flags for CI
          cat > /tmp/pa11y-config.json << 'CONF'
          {
            "standard": "WCAG2AA",
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-gpu", "--disable-dev-shm-usage"]
            },
            "ignore": [
              "WCAG2AA.Principle1.Guideline1_4.1_4_3.G18.Fail",
              "WCAG2AA.Principle1.Guideline1_4.1_4_3.G145.Fail"
            ]
          }
          CONF

          violations=0
          for url in $urls; do
            page=$(echo "$url" | sed 's|http://localhost:8787/||;s|/index.html||;s|index.html|home|')
            echo "::group::$page"
            pa11y --config /tmp/pa11y-config.json \
              "$url" > /tmp/pa11y-out.txt 2>&1 && rc=0 || rc=$?
            cat /tmp/pa11y-out.txt
            if [ "$rc" -eq 0 ]; then
              echo "✓ $page passed"
            elif grep -q 'Error:' /tmp/pa11y-out.txt; then
              echo "⚠ $page — pa11y error (skipped)"
            else
              violations=$((violations + 1))
              echo "::error::WCAG 2.1 AA violations in $page"
            fi
            echo "::endgroup::"
          done

          kill $SERVER_PID 2>/dev/null || true

          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations page(s) with accessibility violations"
            exit 1
          fi
          echo "All pages pass WCAG 2.1 AA."

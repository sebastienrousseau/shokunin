name: "\U0001F310 WASM"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  wasm-build:
    name: Build & test ssg-core (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build ssg-core for wasm32
        run: cargo build -p ssg-core --target wasm32-unknown-unknown

      - name: Test ssg-core (native)
        run: cargo test -p ssg-core

      - name: Build ssg-wasm with wasm-pack
        run: wasm-pack build crates/ssg-wasm --target web --out-dir ../../pkg

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssg-wasm
          path: pkg/
          retention-days: 7

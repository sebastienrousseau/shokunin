name: 🧪 Lint

on:
  push:
    branches:
      - feat/ssg
  pull_request:
    branches:
      - feat/ssg
  release:
    types: [created]

jobs:
  all:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/checkout@v6
      - name: Check lints
        run: cargo clippy --workspace --all-features --all-targets --no-deps -- -D warnings

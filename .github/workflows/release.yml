name: Release

on:
  workflow_dispatch:
    inputs:
      use_github_hosted:
        description: Allow GitHub-hosted release jobs (incurs billed minutes)
        required: false
        default: false
        type: boolean
      dry_run:
        description: Validate release workflow without publishing
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    if: inputs.use_github_hosted
    uses: sebastienrousseau/pipelines/.github/workflows/release.yml@main
    with:
      language: rust
      dry-run: ${{ inputs.dry_run }}
      rust-targets: >-
        [
          {"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"}
        ]
    secrets:
      CRATES_TOKEN: ${{ secrets.CARGO_API_TOKEN }}

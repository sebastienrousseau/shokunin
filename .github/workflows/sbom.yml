# SPDX-License-Identifier: Apache-2.0 OR MIT

name: SBOM

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
          show-progress: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: sbom
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Cache cargo-cyclonedx binary to avoid reinstalling every run
      - name: Cache cargo-cyclonedx
        id: cache-cyclonedx
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cargo/bin/cargo-cyclonedx
          key: cargo-cyclonedx-0.5

      - name: Install cargo-cyclonedx
        if: steps.cache-cyclonedx.outputs.cache-hit != 'true'
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json --output-cdx

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: ./*_cdx.json
          retention-days: 90

      - name: Attest provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ./*_cdx.json

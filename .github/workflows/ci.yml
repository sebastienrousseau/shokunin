# Unified CI Pipeline
# Uses reusable workflows from sebastienrousseau/pipelines
# Replaces: audit.yml, check.yml, format.yml, lint.yml, test.yml, coverage.yml

name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main
      - "feat/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Rust CI
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'stable'
      run-clippy: true
      run-fmt: true
      run-audit: true
      run-coverage: true
      coverage-threshold: 80
    secrets: inherit

  # Nightly toolchain tests (optional, continue on error)
  test-nightly:
    name: Test (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

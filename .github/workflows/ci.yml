name: CI
on:
  push:
    branches: [main, feat/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@47ed7767be5273aef0bbc60c6f6c16aba5fb6f59 # pin to main 2026-04-11
    with:
      rust-version: 'stable'
      run-coverage: true
      # Pedantic/nursery clippy lints are configured at `warn` level in
      # Cargo.toml as advisory cleanup tracks. The shared rust-ci.yml
      # runs `cargo clippy --all-targets -- -D warnings`, which would
      # escalate every advisory warning to an error and fail CI on
      # ~560 pre-existing pedantic violations (mostly in test code).
      # Clippy is still run locally; fixes land in dedicated cleanup
      # PRs rather than gating every release.
      run-clippy: false
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    uses: sebastienrousseau/pipelines/.github/workflows/security.yml@47ed7767be5273aef0bbc60c6f6c16aba5fb6f59 # pin to main 2026-04-11
    with:
      language: rust
      # Override default 'medium' — actions/dependency-review-action
      # only accepts critical/high/moderate/low (upstream bug in
      # pipelines/security.yml).
      severity-threshold: moderate

  docs:
    if: github.ref == 'refs/heads/main'
    uses: sebastienrousseau/pipelines/.github/workflows/docs.yml@47ed7767be5273aef0bbc60c6f6c16aba5fb6f59 # pin to main 2026-04-11
    with:
      type: rust
      redirect-crate: ssg

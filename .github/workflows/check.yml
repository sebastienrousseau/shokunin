name: 🧪 Check

on:
  push:
    branches:
      - main
      - feat/ssg
  pull_request:
    branches:
      - feat/ssg
  release:
    types: [created]

jobs:
  all:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/checkout@v6
      - name: Check lints
        run: cargo check --all-targets --workspace --all-features

name: "\U0001F4D6 Readability Gate"

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "examples/**/content/**/*.md"
      - "content/**/*.md"
  workflow_dispatch:
    inputs:
      target_grade:
        description: "Maximum Flesch-Kincaid grade level"
        type: string
        default: "8.0"

permissions:
  contents: read

jobs:
  readability:
    name: Flesch-Kincaid audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build SSG
        run: cargo build --release -p ssg

      - name: Audit docs/ readability
        run: |
          TARGET="${{ github.event.inputs.target_grade || '8.0' }}"
          echo "## Readability Audit (target: grade $TARGET)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Run the audit via the Rust binary's built-in test harness
          # (audit_all is a library function; we test it via cargo test)
          cargo test -p ssg --lib llm::tests::audit_docs_guide -- --nocapture 2>&1 | tee /tmp/audit.log

          # Check for failures in the output
          if grep -q "FAIL" /tmp/audit.log; then
            echo "::error::Content exceeds Flesch-Kincaid Grade $TARGET"
            echo "| File | Grade | Ease | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|-------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
            grep -E "grade=|PASS|FAIL" /tmp/audit.log >> "$GITHUB_STEP_SUMMARY" || true
            exit 1
          fi

          echo "All content passes readability gate." >> "$GITHUB_STEP_SUMMARY"

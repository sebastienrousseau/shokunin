name: 💾 Format

on:
  push:
    branches:
      - main
      - feat/ssg
  pull_request:
    branches:
      - feat/ssg
  release:
    types: [created]

jobs:
  all:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: actions/checkout@v6
      - name: Check format
        run: cargo fmt --all -- --check --verbose
